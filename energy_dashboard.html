<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root{
  --bg:#f7f9fc;
  --card:#fff;
  --ink:#0f172a;
  --muted:#64748b;
  --border:#d7deea;
  --solar:#16a34a;
  --battery:#0878f7;
  --grid:#ff5c00;
  --use:#7c2ee6;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.wrap{max-width:1500px;margin:auto;padding:18px}
h1{font-size:22px;margin:0 0 6px}
h2{font-size:15px;margin:0 0 10px}
.sub{margin:0 0 16px;color:var(--muted);font-size:14px}
.panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 8px 24px rgba(15,23,42,.08);
  overflow:hidden;
}
svg{
  display:block;
  width:100%;
  height:auto;
  background:radial-gradient(circle at 50% 18%,#fff 0,#fbfdff 62%,#eef4fb 100%);
}
.node{
  fill:#fff;
  stroke:#cbd5e1;
  stroke-width:1.4;
  filter:drop-shadow(0 5px 9px rgba(15,23,42,.12));
}
.inverter{
  fill:#fff;
  stroke:#987999;
  stroke-width:4;
  filter:drop-shadow(0 5px 9px rgba(15,23,42,.12));
}
.nodeTitle{font-size:18px;font-weight:900;fill:var(--ink)}
.nodeValue{font-size:23px;font-weight:900}
.nodeStatus{font-size:15px}
.flow{
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.arrow{
  font-size:24px;
  font-weight:950;
  fill:#fff;
  pointer-events:none;
}
.dot{
  fill:rgba(255,255,255,.85);
  filter:drop-shadow(0 0 5px rgba(255,255,255,.95));
}
body[data-arrows=off] .arrow{display:none}
body[data-anim=off] .dot{display:none}
.flowValue{
  font-size:17px;
  font-weight:850;
  fill:var(--ink);
  paint-order:stroke;
  stroke:#fff;
  stroke-width:6px;
  stroke-linejoin:round;
}
.controlsBox,.legendBox{
  fill:#fff;
  stroke:#dbe3ef;
  stroke-width:1.2;
  filter:drop-shadow(0 4px 8px rgba(15,23,42,.08));
}
.controlTitle{
  font-size:15px;
  font-weight:900;
  fill:var(--ink);
}
.controlLabel{
  font-size:14px;
  fill:var(--ink);
}
.legendText{
  font-size:14px;
  fill:var(--ink);
}
.foreignControl input,.foreignControl select,.foreignControl button{
  font:14px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  border:1px solid #cbd5e1;
  border-radius:8px;
  background:white;
}
.foreignControl input{width:72px;padding:6px 7px}
.foreignControl select{width:70px;padding:6px 7px}
.foreignControl button{
  width:170px;
  padding:9px 10px;
  cursor:pointer;
  font-weight:750;
}
.foreignControl .primary{
  background:#0866ff;
  color:white;
  border-color:#0866ff;
}
.toggle{
  display:flex;
  gap:10px;
  align-items:center;
  font:15px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.toggle input{width:36px;height:20px}
body.controls-hidden #controlsGroup{display:none}
body.controls-hidden #legendGroup{transform:translateY(-150px)}
</style>

function setEnergyFlow(values) {
